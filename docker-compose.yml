services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - bot_logs:/app/logs
    networks:
      - ElixDsBot

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-elixbot}
      POSTGRES_USER: ${POSTGRES_USER:-elixbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-elixbot} -d ${POSTGRES_DB:-elixbot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ElixDsBot

networks:
  ElixDsBot:
    driver: bridge

volumes:
  bot_logs:
  pg_data:
